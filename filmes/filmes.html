<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Filmes & Séries</title>

  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#050505;
      color:white;
      font-family:'Share Tech Mono', monospace;
      overflow-x:hidden;
      min-height:100vh;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;

      background:
      repeating-linear-gradient(
        90deg,
        rgba(0,229,255,0.025) 0px,
        rgba(0,229,255,0.025) 1px,
        transparent 1px,
        transparent 4px
      );

      pointer-events:none;
    }

    .glow{
      position:fixed;
      width:500px;
      height:500px;

      background:rgba(0,229,255,0.08);

      filter:blur(120px);

      top:-150px;
      right:-150px;

      border-radius:50%;
    }

    header{
      width:100%;
      height:80px;

      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:0 60px;

      background:rgba(0,0,0,0.7);
      backdrop-filter:blur(10px);

      border-bottom:1px solid rgba(0,229,255,0.1);

      position:fixed;
      top:0;
      left:0;
      z-index:100;
    }

    .logo{
      font-size:24px;
      letter-spacing:4px;
    }

    .logo span{
      color:#00e5ff;
    }

    .back{
      width:140px;
      height:42px;

      display:flex;
      align-items:center;
      justify-content:center;

      text-decoration:none;

      color:#00e5ff;

      border:1px solid rgba(0,229,255,0.2);

      transition:.3s;
    }

    .back:hover{
      border-color:#00e5ff;

      box-shadow:
      0 0 15px rgba(0,229,255,0.2);
    }

    .hero{
      padding-top:140px;
      padding-bottom:40px;

      text-align:center;
    }

    .hero small{
      color:#00e5ff;
      letter-spacing:4px;
    }

    .hero h1{
      font-size:55px;
      margin-top:20px;
    }

    .hero h1 span{
      color:#00e5ff;
      text-shadow:0 0 12px rgba(0,229,255,0.7);
    }

    .movies{
      width:100%;
      padding:20px 60px 100px;

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(320px,1fr));

      gap:30px;
    }

    .movie-card{
      background:rgba(10,10,10,0.8);

      border:1px solid rgba(0,229,255,0.12);

      overflow:hidden;

      transition:.4s;
    }

    .movie-card:hover{
      transform:translateY(-10px);

      border-color:#00e5ff;

      box-shadow:
      0 0 20px rgba(0,229,255,0.18),
      0 0 45px rgba(0,229,255,0.08);
    }

    .movie-card img{
      width:100%;
      height:220px;

      object-fit:contain;

      background:#000;

      transition:.5s;
    }

    .movie-card:hover img{
      transform:scale(1.05);
    }

    .content{
      padding:25px;
    }

    .movie-title{
      font-size:26px;
      margin-bottom:15px;
    }

    .movie-title span{
      color:#00e5ff;
    }

    .movie-desc{
      color:#9c9c9c;
      line-height:1.7;
      font-size:14px;
    }

    @media(max-width:800px){

      header{
        padding:0 20px;
      }

      .movies{
        padding:20px;
      }

      .hero h1{
        font-size:38px;
      }

    }

  </style>

</head>

<body>

  <div class="glow"></div>

  <header>

    <div class="logo">
      FILMES & <span>SÉRIES</span>
    </div>

    <a href="/index.html#gostos" class="back">
      Voltar
    </a>

  </header>

  <section class="hero">

    <small>ENTRETENIMENTO</small>

    <h1>
      O que eu <span>assisto</span>
    </h1>

  </section>

  <section class="movies">

    <!-- FILME 1 -->
    <div class="movie-card">

      <img src="https://ovicio.com.br/wp-content/uploads/avengers-9.jpg" alt="Vingadores">

      <div class="content">

        <h2 class="movie-title">
          Guerra <span>Infinita</span>
        </h2>


      </div>

    </div>

    <!-- FILME 2 -->
    <div class="movie-card">

      <img src="https://static.wikia.nocookie.net/assista-series/images/5/56/Breaking-Bad.jpg/revision/latest/scale-to-width-down/1200?cb=20150528205254&path-prefix=pt-br" alt="Breaking Bad">

      <div class="content">

        <h2 class="movie-title">
          Breaking <span>Bad</span>
        </h2>


      </div>

    </div>

    <!-- FILME 3 -->
    <div class="movie-card">

      <img src="https://image.tmdb.org/t/p/original/4KzvXYPYmOwABxtWCSPDZg5itdv.jpg" alt="Interestelar">

      <div class="content">

        <h2 class="movie-title">
          Velozes e Furiosos<span> Desafio em Tóquio</span>
        </h2>


      </div>

    </div>

  </section>

</body>

</html>
