<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Jogos Favoritos</title>

  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#050505;
      color:white;
      font-family:'Share Tech Mono', monospace;
      overflow-x:hidden;
      min-height:100vh;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;

      background:
      repeating-linear-gradient(
        90deg,
        rgba(0,229,255,0.025) 0px,
        rgba(0,229,255,0.025) 1px,
        transparent 1px,
        transparent 4px
      );

      pointer-events:none;
    }

    .glow{
      position:fixed;
      width:500px;
      height:500px;

      background:rgba(0,229,255,0.08);

      filter:blur(120px);

      top:-150px;
      right:-150px;

      border-radius:50%;
    }

    header{
      width:100%;
      height:80px;

      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:0 60px;

      background:rgba(0,0,0,0.7);
      backdrop-filter:blur(10px);

      border-bottom:1px solid rgba(0,229,255,0.1);

      position:fixed;
      top:0;
      left:0;
      z-index:100;
    }

    .logo{
      font-size:24px;
      letter-spacing:4px;
    }

    .logo span{
      color:#00e5ff;
    }

    .back{
      width:140px;
      height:42px;

      display:flex;
      align-items:center;
      justify-content:center;

      text-decoration:none;

      color:#00e5ff;

      border:1px solid rgba(0,229,255,0.2);

      transition:.3s;
    }

    .back:hover{
      border-color:#00e5ff;

      box-shadow:
      0 0 15px rgba(0,229,255,0.2);
    }

    .hero{
      padding-top:140px;
      padding-bottom:40px;

      text-align:center;
    }

    .hero small{
      color:#00e5ff;
      letter-spacing:4px;
    }

    .hero h1{
      font-size:55px;
      margin-top:20px;
    }

    .hero h1 span{
      color:#00e5ff;
      text-shadow:0 0 12px rgba(0,229,255,0.7);
    }

    .games{
      width:100%;

      padding:20px 60px 100px;

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(320px,1fr));

      gap:30px;
    }

    .game-card{
      background:rgba(10,10,10,0.8);

      border:1px solid rgba(0,229,255,0.12);

      overflow:hidden;

      transition:.4s;
    }

    .game-card:hover{
      transform:translateY(-10px);

      border-color:#00e5ff;

      box-shadow:
      0 0 20px rgba(0,229,255,0.18),
      0 0 45px rgba(0,229,255,0.08);
    }

    .game-card img{
  width:100%;
  height:220px;

  object-fit:contain;

  background:#000;

  transition:.5s;
}

    .game-card:hover img{
      transform:scale(1.05);
    }

    .content{
      padding:25px;
    }

    .game-title{
      font-size:26px;
      margin-bottom:15px;
    }

    .game-title span{
      color:#00e5ff;
    }

    .game-desc{
      color:#9c9c9c;
      line-height:1.7;
      font-size:14px;
    }

    @media(max-width:800px){

      header{
        padding:0 20px;
      }

      .games{
        padding:20px;
      }

      .hero h1{
        font-size:38px;
      }

    }

  </style>

</head>

<body>

  <div class="glow"></div>

  <header>

    <div class="logo">
      MEUS <span>JOGOS</span>
    </div>

    <a href="/index.html#gostos" class="back">
      Voltar
    </a>

  </header>

  <section class="hero">

    <small>GAMES FAVORITOS</small>

    <h1>
      Jogos que eu <span>curto</span>
    </h1>

  </section>

  <section class="games">

    <!-- JOGO 1 -->
    <div class="game-card">

      <img src="https://m.media-amazon.com/images/I/61ajvYHk57L._AC_UF350,350_QL80_.jpg" alt="Elden Ring">

      <div class="content">

        <h2 class="game-title">
          <span>Elden</span> Ring
        </h2>


      </div>

    </div>

    <!-- JOGO 2 -->
    <div class="game-card">

      <img src="https://m.media-amazon.com/images/I/71xOjwNi0kL._AC_UF1000,1000_QL80_.jpg" alt="Red Dead Redemption 2">

      <div class="content">

        <h2 class="game-title">
          Red Dead <span>Redemption 2</span>
        </h2>


      </div>

    </div>

    <!-- JOGO 3 -->
    <div class="game-card">

      <img src="https://preview.redd.it/minecraft-cover-art-seed-v0-2zs6alhs84y71.png?width=767&format=png&auto=webp&s=f9347a773026654dd349ee4c4c72f96167a2f93f" alt="Minecraft">

      <div class="content">

        <h2 class="game-title">
          Mine<span>craft</span>
        </h2>


      </div>

    </div>

     <!-- JOGO 4 -->
     <div class="game-card">

      <img src="https://cms-assets.xboxservices.com/assets/3e/29/3e294a2c-66ef-4ba5-90fb-53dda66b88ea.jpg?n=0399951111277_GLP-Page-Hero-1084_1920x1080_02.jpg" alt="Minecraft">

      <div class="content">

        <h2 class="game-title">
          Forza<span> Horizon 6</span>
        </h2>


      </div>

    </div>

    <!-- JOGO 5 -->
    <div class="agame-card">

      <img src="" alt="Minecraft">

      <div class="content">

        <h2 class="game-title">
          Hollow<span> Knight</span>
        </h2>


      </div>

    </div>

    <!-- JOGO 6 -->
    <div class="game-card">

      <img src="https://tm.ibxk.com.br/2022/03/21/21141150825393.jpg" alt="Minecraft">

      <div class="content">

        <h2 class="game-title">
          Hogwarts<span> Legacy</span>
        </h2>


      </div>

    </div>

  </section>

</body>

</html>
